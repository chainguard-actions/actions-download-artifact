name: Test download-artifact with pattern input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          pattern: 'my-artifact-*'
          path: /tmp/downloaded-artifacts
          merge-multiple: 'true'
      - name: Assert action ran with pattern input
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" = "success" ] || [ "$OUTCOME" = "failure" ]; then
            echo "PASS: action executed with pattern input"
          else
            echo "FAIL: unexpected outcome '$OUTCOME'"
            exit 1
          fi
