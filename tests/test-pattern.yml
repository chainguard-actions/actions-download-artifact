name: Test download-artifact with pattern input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          pattern: 'my-artifact-*'
          path: /tmp/artifacts
          merge-multiple: 'true'
      - name: Assert step ran (inputs accepted)
        run: |
          echo "Step completed (with or without artifact found)"
          echo "download-path: ${{ steps.action.outputs.download-path }}"
          echo "PASS: pattern input was accepted by the action"
