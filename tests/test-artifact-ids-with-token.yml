name: Test download-artifact with artifact-ids and github-token inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          artifact-ids: '123456789'
          github-token: 'fake-token-for-testing'
          path: /tmp/downloaded-artifacts
          repository: ${{ github.repository }}
          run-id: ${{ github.run_id }}
      - name: Assert action ran with artifact-ids and github-token inputs
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" = "success" ] || [ "$OUTCOME" = "failure" ]; then
            echo "PASS: action executed with artifact-ids and github-token inputs"
          else
            echo "FAIL: unexpected outcome '$OUTCOME'"
            exit 1
          fi
